name: ci-golang-workflow
on: 
  pull_request: 
    branches:
      - develop

jobs:
  check-application:
    strategy:
      matrix: 
        go: ['1.26.0', '1.26.2'] 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go }}
      - run: go test
      - run: go run math.go
